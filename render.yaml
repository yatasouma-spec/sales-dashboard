databases:
  - name: sales-dashboard-db
    plan: free

services:
  - type: web
    name: sales-dashboard
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sales-dashboard-db
          property: connectionString

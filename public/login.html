<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - 営業管理ダッシュボード</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
      background: #f1f5f9; color: #1e293b; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: #fff; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08); margin: 20px;
    }
    .login-card h1 { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 8px; }
    .login-card .subtitle { text-align: center; font-size: 14px; color: #64748b; margin-bottom: 32px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 6px; }
    .form-group input {
      width: 100%; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 8px;
      font-size: 15px; color: #1e293b; transition: border-color 0.15s;
    }
    .form-group input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
    .error-msg {
      background: #fee2e2; color: #dc2626; padding: 10px 14px; border-radius: 8px;
      font-size: 13px; margin-bottom: 16px; display: none;
    }
    .login-btn {
      width: 100%; padding: 12px; background: #3b82f6; color: #fff; border: none;
      border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s;
    }
    .login-btn:hover { background: #2563eb; }
    .login-btn:disabled { background: #94a3b8; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>営業管理ダッシュボード</h1>
    <p class="subtitle">ログインしてください</p>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">ユーザー名</label>
        <input type="text" id="username" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">パスワード</label>
        <input type="password" id="password" autocomplete="current-password" required>
      </div>
      <div class="error-msg" id="errorMsg"></div>
      <button type="submit" class="login-btn" id="loginBtn">ログイン</button>
    </form>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('errorMsg');
      btn.disabled = true;
      btn.textContent = 'ログイン中...';
      errEl.style.display = 'none';
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = '/';
        } else {
          errEl.textContent = data.error;
          errEl.style.display = 'block';
        }
      } catch (err) {
        errEl.textContent = 'サーバーに接続できません';
        errEl.style.display = 'block';
      }
      btn.disabled = false;
      btn.textContent = 'ログイン';
    });
  </script>
</body>
</html>
